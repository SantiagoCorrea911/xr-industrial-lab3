<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Modelo CAD Industrial XR</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Piso -->
      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="20" height="20"
        color="#B0BEC5">
      </a-plane>

      <!-- Cielo -->
      <a-sky color="#CFD8DC"></a-sky>

      <!-- Luces -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" position="2 4 -1" intensity="0.6"></a-light>

      <!-- Modelo CAD -->
      <a-assets>
        <a-asset-item id="modeloCAD" src="models/modelo.glb"></a-asset-item>
      </a-assets>

      <a-entity
        gltf-model="#modeloCAD"
        position="0 2 -1"
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>

    </a-scene>
  </body>

</html>
